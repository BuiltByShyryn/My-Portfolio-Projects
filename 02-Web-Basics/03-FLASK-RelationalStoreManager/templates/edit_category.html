<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Category</title>
</head>
<body>
    <h1>Edit Category</h1>
    <form method="POST">
        <label for="name">Category Name:</label>
        <input type="text" name="name" id="name" value="{{ category.name }}" required><br><br>

        <label for="description">Category Description:</label>
        <textarea name="description" id="description" required>{{ category.description }}</textarea><br><br>

        <label for="brand_id">Brand:</label>
        <select name="brand_id" id="brand_id" required>
            {% for brand in brands %}
                <option value="{{ brand.id }}" {% if brand.id == category.brand_id %} selected {% endif %}>
                    {{ brand.name }}
                </option>
            {% endfor %}
        </select><br><br>

        <input type="submit" value="Save Changes">
    </form>
</body>
</html>
