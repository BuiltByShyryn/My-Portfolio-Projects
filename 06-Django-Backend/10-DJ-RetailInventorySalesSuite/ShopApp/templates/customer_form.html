<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
</head>
<body>
    <h2>{{ title }}</h2>

    {% if status %}
        <p style="color: green;">{{ status }}</p>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Customer</button>
    </form>

    <hr>
    <button onclick="history.back()">Back</button>
</body>
</html>
