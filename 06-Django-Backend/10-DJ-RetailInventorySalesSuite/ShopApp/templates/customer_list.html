<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}}</title>
</head>
<body>
    
<h2>Customer List</h2>

<p>
    {% for customer in data %}

    {% endfor %}
</p>
    
</body>
</html>
