<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Pet Paradise</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        table { width: 50%; margin: auto; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ccc; }
        th { background-color: #ffcc00; }
        .button {
            padding: 10px 20px;
            background-color: #ff6600;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        .button:hover { background-color: #cc5500; }
    </style>
</head>
<body>
    <h2>Checkout</h2>
    <table>
        <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
        </tr>
        {% for item in cart_items %}
        <tr>
            <td>{{ item[0] }}</td>
            <td>${{ item[1] }}</td>
            <td>{{ item[2] }}</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <form action="{{ url_for('order_confirmation') }}" method="post">
        <button class="button" type="submit">Confirm Order</button>
    </form>
</body>
</html>
