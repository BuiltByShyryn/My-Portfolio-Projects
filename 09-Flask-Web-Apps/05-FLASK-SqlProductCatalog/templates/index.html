<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products List</title>
</head>
<body>
    <h1>Products List</h1>
    <ul>
        {% for product in products %}
        <li>
            <h2>{{ product[1] }}</h2>
            <p>{{ product[2] }}</p>
            <p>Price: ${{ product[3] }}</p>
            <p>Stock: {{ product[4] }}</p>
            <a href="/products/{{ product[0] }}">View Details</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
